services:
  - type: web
    name: civicfix
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: sys
      - key: DB_USER
        value: 48rF6Ed8v1fztaA.root
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: REQUIRED
      - key: AES_KEY
        sync: false
      - key: JAVA_OPTS
        value: "-Xms128m -Xmx400m -XX:+UseG1GC"
