services:
  - type: web
    name: civicfix
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: AES_KEY
        sync: false
      - key: JAVA_OPTS
        value: "-Xms128m -Xmx400m -XX:+UseG1GC"
