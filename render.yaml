services:
  - type: web
    name: civicfix
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        value: ballast.proxy.rlwy.net
      - key: DB_PORT
        value: "12771"
      - key: DB_NAME
        value: civicfix
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        sync: false
      - key: AES_KEY
        sync: false
      - key: JAVA_OPTS
        value: "-Xms128m -Xmx400m -XX:+UseG1GC"
