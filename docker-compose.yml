services:
  db:
    image: mysql:8.0
    container_name: civicfix_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: civicfix_db
    ports:
      - "3309:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: civicfix_app
    restart: always
    ports:
      - "8090:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/civicfix_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_DRIVER=com.mysql.cj.jdbc.Driver
      - DB_DIALECT=org.hibernate.dialect.MySQL8Dialect
    volumes:
      - ./uploads:/usr/local/tomcat/webapps/uploads/complaints
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
